# Koyeb deployment config — free Starter plan, no credit card required
# Deploy via the Koyeb dashboard: connect your GitHub repo and set root to api/
# Or via CLI: koyeb app init stocksage-api --git github.com/YOUR_USERNAME/stocksage \
#   --git-branch main --git-build-command "pip install -r requirements.txt" \
#   --git-run-command "uvicorn app.main:app --host 0.0.0.0 --port 8000" \
#   --ports 8000:http --routes /:8000

name: stocksage-api
services:
  - name: api
    type: web
    instance_type: free          # 512MB RAM, 0.1 vCPU — free forever, no CC
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    build:
      type: dockerfile
      dockerfile: Dockerfile
    env:
      # DATABASE_URL is auto-injected by Koyeb when you attach the free Postgres addon
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        secret: stocksage-secret-key        # set in Koyeb dashboard → Secrets
      - key: API_KEY_SALT
        secret: stocksage-api-key-salt
      - key: UPSTASH_REDIS_REST_URL
        secret: upstash-redis-url           # from upstash.com free tier
      - key: UPSTASH_REDIS_REST_TOKEN
        secret: upstash-redis-token
      - key: ALLOWED_ORIGINS
        value: "https://your-app.vercel.app,http://localhost:3000"
      - key: MODEL_ARTIFACTS_DIR
        value: "/app/models"
    health_checks:
      - path: /health
        port: 8000
        initial_delay_seconds: 30
        period_seconds: 30
